version: "3.9"

services:
  app:
    build: .
    container_name: study-planner
    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production

    restart: unless-stopped

    # for monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3